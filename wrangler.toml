name = "cf-ai-site-starter-api"
main = "app/worker/src/index.ts"
compatibility_date = "2026-05-09"
compatibility_flags = ["nodejs_compat"]
account_id = ""

[assets]
directory = "app/frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
APP_ENV = "development"
TURNSTILE_SITE_KEY = ""

[[d1_databases]]
binding = "DB"
database_name = "cf_ai_site_db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "FILES"
bucket_name = "cf-ai-site-assets"

[env.preview]
name = "cf-ai-site-starter-api-preview"
vars = { APP_ENV = "preview", TURNSTILE_SITE_KEY = "" }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "cf_ai_site_db_preview"
database_id = "REPLACE_WITH_PREVIEW_D1_DATABASE_ID"
migrations_dir = "migrations"

[[env.preview.kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

[[env.preview.r2_buckets]]
binding = "FILES"
bucket_name = "cf-ai-site-assets-preview"

[env.production]
name = "cf-ai-site-starter-api"
vars = { APP_ENV = "production", TURNSTILE_SITE_KEY = "" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "cf_ai_site_db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "cf-ai-site-assets"
